version: '3.8'

services:
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: mqtt_service
    restart: always
    ports:
      - "1883:1883"   # MQTT 標準連接埠
      - "9001:9001"   # WebSocket 連接埠 (選配)
    volumes:
      - ./config:/mosquitto/config
      - ./data:/mosquitto/data
      - ./log:/mosquitto/log
    networks:
      - mqtt-net

  mqtt-server:
    build: ./mqtt-server
    container_name: mqtt_server
    restart: always
    environment:
      - MQTT_BROKER=mqtt-broker
    ports:
      - "8080:8080"   # OTA 韌體檔案下載（/firmware/<file>.bin）
      - "8090:8090"   # 網頁監控 web_monitor.py
    volumes:
      - ./mqtt-server:/app   # 掛整個目錄：改 code 後 restart 生效，devices.json 保留在本機
    depends_on:
      - mqtt-broker
    networks:
      - mqtt-net

  node-red:
    image: nodered/node-red:latest
    container_name: node_red
    restart: always
    ports:
      - "1880:1880"   # Node-RED 編輯器
    volumes:
      - ./node-red-data:/data
    environment:
      - TZ=Asia/Taipei
    depends_on:
      - mqtt-broker
    networks:
      - mqtt-net

  mysql:
    image: mysql:8.0
    container_name: iot_mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=devroot123
      - MYSQL_DATABASE=devicemanagement
      - MYSQL_USER=apiuser
      - MYSQL_PASSWORD=devpass123
    ports:
      - "3306:3306"   # 方便本機用 DB client 連進去看資料，非必要可拿掉
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./API/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pdevroot123"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mqtt-net

  api:
    build: ./API
    container_name: iot_api
    restart: always
    environment:
      - DB_HOST=mysql
      - DB_USER=apiuser
      - DB_PASS=devpass123
      - DB_PASSWORD=devpass123
      - DB_NAME=devicemanagement
      - CONTROL_MODE=mqtt
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    ports:
      - "8091:8000"   # 家庭/裝置管理 API（見 API/gateway.py 的路由列表）
    volumes:
      - ./API:/app
    depends_on:
      mysql:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    networks:
      - mqtt-net

  api-mqtt-bridge:
    build: ./API
    container_name: iot_api_mqtt_bridge
    restart: always
    command: ["python", "-u", "control_device/mqtt_topic_bridge.py"]
    environment:
      - DB_HOST=mysql
      - DB_USER=apiuser
      - DB_PASS=devpass123
      - DB_PASSWORD=devpass123
      - DB_NAME=devicemanagement
      - MQTT_HOST=mqtt-broker
      - MQTT_PORT=1883
    volumes:
      - ./API:/app
    depends_on:
      mysql:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    networks:
      - mqtt-net

networks:
  mqtt-net:
    driver: bridge